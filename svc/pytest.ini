[pytest]
# Disable hydra pytest plugin to avoid antlr4 version conflict
# The plugin is auto-loaded from the environment but not needed for these tests
addopts = -p no:hydra_pytest

# Add directories to Python path for imports to work properly
# This is needed because the .pth file in site-packages may not be processed
# properly when using Nix Python:
# - ../libs: for importing the otokuna package
# - .: for importing the service modules (build_search_url, predict, etc.)
pythonpath = ../libs .
